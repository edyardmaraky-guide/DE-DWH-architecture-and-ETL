version: '3.8'

services:
  oltp_db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: oltp
    ports:
      - "5432:5432"
    volumes:
      - ./sql/oltp_init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - airflow_network

  dwh_db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - ./sql/dwh_init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - airflow_network

  airflow-postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pg:/var/lib/postgresql/data
    networks:
      - airflow_network

  airflow:
    image: apache/airflow:3.1.6
    container_name: airflow
    depends_on:
      - airflow-postgres
      - oltp_db
      - dwh_db
    environment:
      - AIRFLOW__CORE__DAGS_FOLDER=/opt/airflow/dags
      - AIRFLOW__SCHEDULER__DAG_DIR_LIST_INTERVAL=10
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False

      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow

      - AIRFLOW__AUTH__AUTH_MANAGER=simple_auth_manager

      - AIRFLOW__WEBSERVER__SECRET_KEY=supersecret
      - AIRFLOW__API__SECRET_KEY=supersecret

      - _AIRFLOW_DB_MIGRATE=true

    ports:
      - "8080:8080"

    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      - ./scripts:/opt/airflow/scripts

    command: >
      bash -c "
      airflow db migrate &&
      airflow dag-processor &
      airflow scheduler & 
      airflow api-server
      "

    networks:
      - airflow_network

volumes:
  oltp_data:
  dwh_data:
  airflow_pg:
  # airflow_data:
  # postgres-db-volume:

networks:
  airflow_network:
    driver: bridge